name: Reusable Fly.io Deploy

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing fly.toml (repo root by default)"
        type: string
        default: "."
      fly-config-path:
        description: "Path (relative to working-directory) to the fly config file"
        type: string
        default: "fly.toml"
    secrets:
      FLY_API_TOKEN:
        description: "Fly.io deploy token (flyctl auth token)"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v7

      - uses: superfly/flyctl-actions/setup-flyctl@v1.4

      - name: Deploy
        # --local-only: build the image on this runner (which already has the
        # source, as your own CI) and push only the finished image to Fly's
        # registry — Fly's own build infra never receives the source tree.
        # Requires Docker on the runner (ubuntu-latest has it preinstalled).
        run: flyctl deploy --local-only -c ${{ inputs.fly-config-path }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
